name: Build Mac + Windows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  # ------------------------------------------------------------ macOS
  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ad-hoc codesign the .app
        # Not a Developer ID signature (that costs $99/yr) — just an
        # ad-hoc signature so macOS has something to attach the
        # quarantine-bypass decision to after the user runs xattr -dr.
        run: |
          codesign --force --deep --sign - Feedscript.app || true
          codesign --verify --verbose Feedscript.app || true

      - name: Write install instructions alongside the app
        run: |
          cat > "READ ME FIRST.txt" <<'EOF'
          Feedscript for macOS — install instructions

          macOS blocks unsigned apps from opening by default. Getting
          around it takes one Terminal command — do this once.

          STEP 1. Drag Feedscript.app into /Applications (or any folder
                  you like).

          STEP 2. Open Terminal and paste this, then hit Enter:

                  xattr -dr com.apple.quarantine /Applications/Feedscript.app

                  (If you put the app somewhere else, adjust the path.)

          STEP 3. Double-click Feedscript.app. The first launch installs
                  ffmpeg and the Whisper model; after that it opens in
                  about 2 seconds.

          Why this extra step? Apple requires a paid Developer ID
          certificate ($99/yr) to skip this dialog. Feedscript is a
          free open-source tool, so we don't buy one. The full source
          is here — inspect anything you want:

                  https://github.com/smhammad/feedscript
          EOF

      - name: Zip Feedscript.app + instructions
        run: |
          mkdir -p dist
          # macOS .app bundles ship as a folder; users expect a .zip they
          # can double-click to unarchive into Applications.
          ditto -c -k --sequesterRsrc --keepParent "Feedscript.app" "dist/Feedscript-macOS.zip"
          # Tack the instructions file into the same zip
          (cd "$(pwd)" && zip -j "dist/Feedscript-macOS.zip" "READ ME FIRST.txt")
          ls -la dist/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Feedscript-macOS
          path: dist/Feedscript-macOS.zip
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Feedscript-macOS.zip
          draft: false
          prerelease: false
          generate_release_notes: true

  # --------------------------------------------------------- Windows
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller Pillow

      - name: Build icon (.ico)
        run: python build_icon.py

      - name: Build .exe
        run: pyinstaller feedscript.spec --noconfirm --clean

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Feedscript-Windows
          path: dist/Feedscript.exe
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Feedscript.exe
          draft: false
          prerelease: false
          generate_release_notes: true
